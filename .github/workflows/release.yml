name: build-release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: harp-rs-linux-x86_64

          - os: macos-15-intel
            target: x86_64-apple-darwin
            artifact: harp-rs-macos-intel

          - os: macos-15
            target: aarch64-apple-darwin
            artifact: harp-rs-macos-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Build Dependencies
        run: |
          if [[ "${{ matrix.target }}" == "x86_64-unknown-linux-gnu" ]]; then
            sudo apt-get update
            sudo apt-get install -y build-essential
          elif [[ "${{ matrix.target }}" == "x86_64-apple-darwin" || "${{ matrix.target }}" == "aarch64-apple-darwin" ]]; then
            echo "Ensure macOS runner supports target."
          fi

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Verify Build Output
        run: ls -R target/${{ matrix.target }}/release/

      - name: Package
        run: |
          mkdir -p dist/${{ matrix.artifact }}
          cp target/${{ matrix.target }}/release/harp-rs dist/${{ matrix.artifact }}/
          cp README.md dist/${{ matrix.artifact }}/ 2>/dev/null || true
          cp LICENSE dist/${{ matrix.artifact }}/ 2>/dev/null || true
          tar -czf dist/${{ matrix.artifact }}.tar.gz -C dist ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}.tar.gz